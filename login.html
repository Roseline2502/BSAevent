<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSAEvent — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Cache le body pendant la vérification de session */
    /* Évite le clignotement si déjà connecté          */
    body {
      visibility: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      border: 0.5px solid #e0e0de;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img {
      height: 52px;
      object-fit: contain;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 600;
      color: #7F77DD;
      margin-top: 8px;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      color: #888;
      font-weight: 500;
    }
    input {
      padding: 10px 12px;
      border-radius: 8px;
      border: 0.5px solid #ccc;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      transition: border-color .15s;
    }
    input:focus {
      outline: none;
      border-color: #7F77DD;
    }
    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: #7F77DD;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn:hover    { background: #534AB7; }
    .btn:disabled { background: #b0adea; cursor: not-allowed; }
    .error {
      background: #FCEBEB;
      color: #A32D2D;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 14px;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <img src="assets/LogoEvent.png" alt="BSAEvent"
      onerror="this.style.display='none'">
    <div class="logo-text">BSAEvent</div>
  </div>

  <h2>Connexion</h2>
  <p class="subtitle">Accès réservé au personnel autorisé</p>

  <div class="form-group">
    <label>Adresse email</label>
    <input type="email" id="email"
      placeholder="votre@email.com"
      autocomplete="email" />
  </div>

  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password"
      placeholder="••••••••"
      autocomplete="current-password" />
  </div>

  <button class="btn" id="btn-login" onclick="login()">
    Se connecter
  </button>

  <div class="error" id="error-msg"></div>

</div>

<script type="module">
import { signIn, getSession } from "./js/api/auth.js";

// ── Vérification session au démarrage ─────────────────────────
// Si déjà connecté → redirige sans afficher la page (pas de clignotement)
// Si pas connecté → affiche la page de login
async function checkAlreadyLoggedIn() {
  const session = await getSession();
  if (session) {
    // Déjà connecté — redirige directement sans afficher le formulaire
    window.location.href = "./select-event.html";
  } else {
    // Pas connecté — affiche la page maintenant
    document.body.style.visibility = "visible";
  }
}

checkAlreadyLoggedIn();

// ── Connexion sur appui Entrée ────────────────────────────────
document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});
document.getElementById("email").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("password").focus();
});

// ── Fonction de connexion ─────────────────────────────────────
window.login = async function () {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorEl  = document.getElementById("error-msg");
  const btn      = document.getElementById("btn-login");

  errorEl.classList.remove("visible");

  if (!email || !password) {
    errorEl.textContent = "Veuillez remplir tous les champs.";
    errorEl.classList.add("visible");
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Connexion...";

  const { user, error } = await signIn(email, password);

  if (error) {
    errorEl.textContent = error.includes("Invalid")
      ? "Email ou mot de passe incorrect."
      : "Erreur de connexion. Réessayez.";
    errorEl.classList.add("visible");
    btn.disabled    = false;
    btn.textContent = "Se connecter";
    return;
  }

  // ✅ Connecté — redirige vers la sélection d'événement
  // Cette ligne est bien DANS login(), pas en dehors
  window.location.href = "./select-event.html";
};
</script>
</body>
</html>
